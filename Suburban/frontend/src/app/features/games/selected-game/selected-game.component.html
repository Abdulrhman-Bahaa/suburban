@if (game$ | async; as game) {
  <section class="game-details">
    <!-- HERO -->
    <div class="hero" [style.background-image]="'url(' + game.coverImageUrl + ')'">
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <div class="badge">
          {{ game.genre }}
        </div>

        <h1 class="title">
          {{ game.title }}
        </h1>

        <div class="meta">
          <div class="meta-item">
            <span class="label">Release</span>
            <span>{{ game.releaseDate | date: 'longDate' }}</span>
          </div>

          <div class="meta-item">
            <span class="label">Rating</span>
            <span class="rating"> ★ {{ game.rating }}/10 </span>
          </div>
        </div>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content-container">
      <div class="content-card">
        <h2>About the Game</h2>

        <p class="description">
          {{ game.description }}
        </p>
      </div>

      <!-- ACTION BUTTON -->
      <div class="actions">
        <button class="btn-primary" (click)="(game)">Add to Cart</button>
      </div>
    </div>
  </section>
} @else {
  <div class="loading-container">
    <div class="loader"></div>
    <p>Loading game details...</p>
  </div>
}
