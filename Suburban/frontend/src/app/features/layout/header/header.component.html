<header class="navbar">
  <div class="logo-container">
    <div class="logo-text" routerLink="/">SUBURBAN</div>
  </div>

  <nav class="nav-links">
    <a routerLink="/store" routerLinkActive="active">Store</a>
    <a routerLink="/library" routerLinkActive="active">Library</a>
    <a routerLink="/categories" routerLinkActive="active">Categories</a>
    <a routerLink="/support" routerLinkActive="active">Support</a>
    <a routerLink="/cart" routerLinkActive="active">Cart</a>
    <a routerLink="/profile" routerLinkActive="active">Profile</a>
  </nav>

  <div class="user-tools">
    <div class="search-wrapper">
      <input type="text" class="search-bar" placeholder="Search games..." />
    </div>

    <button class="icon-btn" routerLink="/cart" aria-label="Shopping Cart">
      <span class="cart-icon">🛒</span>
    </button>

    <a class="user-profile" routerLink="/profile" aria-label="User Profile">
      <div class="avatar"></div>
    </a>
  </div>
</header>
